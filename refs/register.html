<style>
        body {
            background-color: #F8F8F8; /* Base canvas from style guidance */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .thread-pattern {
            background-color: #f8f8f8;
            background-image: radial-gradient(#e2e8f0 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }

<body class="font-body-md text-on-surface antialiased thread-pattern min-h-screen flex items-center justify-center p-gutter">
<!-- Registration Card -->
<main class="w-full max-w-md bg-background-alt border border-border-subtle rounded-lg shadow-[0px_4px_12px_rgba(52,73,94,0.05)] overflow-hidden">
<!-- Brand Header Section -->
<div class="p-stack-lg flex flex-col items-center text-center space-y-stack-sm border-b border-border-subtle bg-surface-container-low/30">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined text-3xl" data-icon="forum">forum</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary">Supatechia Forum</h1>
<p class="font-body-md text-on-surface-variant max-w-[280px]">Join our community of knowledge seekers and industry experts.</p>
</div>
<!-- Form Section -->
<div class="p-stack-lg">
<form class="space-y-stack-md" id="registrationForm">
<!-- Full Name Field -->
<div class="space-y-unit">
<label class="block font-label-md text-label-md text-deep-slate" for="fullName">
                        Full Name
                    </label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-success-emerald transition-colors" data-icon="person">person</span>
<input class="w-full pl-10 pr-4 py-2 bg-background-alt border border-border-subtle rounded-lg focus:ring-0 focus:border-success-emerald transition-all outline-none font-body-md text-on-surface placeholder:text-outline-variant/60" id="fullName" name="fullName" placeholder="Enter your full name" type="text">
</div>
</div>
<!-- Email Field -->
<div class="space-y-unit">
<label class="block font-label-md text-label-md text-deep-slate" for="email">
                        Email Address
                    </label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-success-emerald transition-colors" data-icon="mail">mail</span>
<input class="w-full pl-10 pr-4 py-2 bg-background-alt border border-border-subtle rounded-lg focus:ring-0 focus:border-success-emerald transition-all outline-none font-body-md text-on-surface placeholder:text-outline-variant/60" id="email" name="email" placeholder="name@supatechia.com" type="email">
</div>
</div>
<!-- Password Field -->
<div class="space-y-unit">
<label class="block font-label-md text-label-md text-deep-slate" for="password">
                        Password
                    </label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-success-emerald transition-colors" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-12 py-2 bg-background-alt border border-border-subtle rounded-lg focus:ring-0 focus:border-success-emerald transition-all outline-none font-body-md text-on-surface placeholder:text-outline-variant/60" id="password" name="password" placeholder="••••••••" type="password">
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-deep-slate" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility" id="passwordToggleIcon">visibility</span>
</button>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]" data-icon="info">info</span>
                        At least 8 characters with a number.
                    </p>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-stack-sm pt-unit">
<input class="mt-1 rounded-sm border-border-subtle text-success-emerald focus:ring-success-emerald focus:ring-offset-0" id="terms" type="checkbox">
<label class="font-body-md text-[14px] leading-tight text-on-surface-variant" for="terms">
                        I agree to the <a class="text-secondary font-medium hover:underline" href="#">Terms of Service</a> and <a class="text-secondary font-medium hover:underline" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Submit Button -->
<button class="w-full bg-success-emerald hover:bg-on-secondary-container text-on-primary font-body-md font-semibold py-3 px-gutter rounded-lg shadow-sm transition-all active:scale-[0.98] mt-stack-md flex items-center justify-center gap-2" type="submit">
<span class="">Register</span>
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Secondary Actions -->
<div class="mt-stack-lg text-center space-y-stack-sm">
<p class="font-body-md text-on-surface-variant">
                    Already have an account? 
                    <a class="text-secondary font-semibold hover:underline" href="#">Login here</a>
</p>
</div>
</div>
<!-- Progress Indicator (Atmospheric) -->
<div class="h-1 w-full bg-surface-container flex">
<div class="h-full bg-success-emerald/20 w-1/3"></div>
<div class="h-full bg-surface-container w-2/3"></div>
</div>
</main>
<!-- Visual Anchor / Decorative Element -->
<div class="fixed bottom-gutter right-gutter hidden lg:block opacity-40 pointer-events-none">
<div class="font-label-md text-label-md text-deep-slate flex items-center gap-stack-sm">
<span class="material-symbols-outlined" data-icon="verified_user">verified_user</span>
<span class="">Supatechia Secure Encryption</span>
</div>
</div>
<!-- Micro-interaction Script -->
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('passwordToggleIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility';
            }
        }

        // Simple form validation micro-interaction
        const form = document.getElementById('registrationForm');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="sync">sync</span>';
            
            setTimeout(() => {
                btn.classList.replace('bg-success-emerald', 'bg-primary');
                btn.innerHTML = '<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span> <span>Welcome to Nexus!</span>';
                
                // Reset after 2s for demo purposes
                setTimeout(() => {
                    btn.disabled = false;
                    btn.classList.replace('bg-primary', 'bg-success-emerald');
                    btn.innerHTML = originalContent;
                }, 2000);
            }, 1000);
        });

        // Focus ring enhancement for inputs
        const inputs = document.querySelectorAll('input[type="text"], input[type="email"], input[type="password"]');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('ring-1', 'ring-success-emerald/30');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('ring-1', 'ring-success-emerald/30');
            });
        });
    </script>


</body></html>
